<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Riemann Sum Area Applet</title>
  <style>
    :root {
      --ink: #181b22;
      --muted: #5e6674;
      --panel: #e9eef8;
      --line: #8c929a;
      --blue: #244a9a;
      --blue-soft: rgba(36, 74, 154, 0.14);
      --pink: #c33368;
      --pink-soft: rgba(195, 51, 104, 0.16);
      --purple: #6757d7;
      --track: #e89aae;
      --shadow: rgba(20, 24, 32, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: #f7f8fa;
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(1220px, calc(100vw - 20px));
      margin: 0 auto;
      padding: 10px 0 24px;
    }

    .intro {
      margin: 0 0 10px;
      font-size: clamp(1rem, 2vw, 1.42rem);
      line-height: 1.45;
    }

    .applet {
      border: 2px solid var(--line);
      background: #fff;
      box-shadow: 0 15px 40px var(--shadow);
      overflow: hidden;
    }

    .graph-wrap {
      height: min(560px, 53vw);
      min-height: 410px;
      background: #fff;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(310px, 0.78fr) minmax(470px, 1fr);
      gap: 18px 34px;
      padding: 26px 42px 30px;
      background: var(--panel);
      border-top: 3px solid #9ca6c1;
      align-items: center;
    }

    .toggles {
      display: flex;
      align-items: center;
      gap: 22px;
      flex-wrap: wrap;
    }

    label {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #343944;
      font-size: clamp(1.04rem, 1.9vw, 1.45rem);
      font-weight: 800;
      line-height: 1.15;
      white-space: nowrap;
    }

    input[type="checkbox"] {
      appearance: none;
      width: 50px;
      aspect-ratio: 1;
      flex: 0 0 auto;
      margin: 0;
      border: 3px solid #858991;
      border-radius: 5px;
      background: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    input[type="checkbox"]:checked {
      border-color: var(--purple);
      background: var(--purple);
    }

    input[type="checkbox"]:checked::after {
      content: "";
      width: 27px;
      height: 15px;
      border-left: 5px solid white;
      border-bottom: 5px solid white;
      transform: rotate(-45deg) translate(2px, -2px);
    }

    .slider-block {
      display: grid;
      grid-template-columns: auto minmax(220px, 1fr);
      gap: 8px 22px;
      align-items: center;
      min-width: min(100%, 560px);
    }

    .method-block {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .method-title {
      color: #3f424b;
      font-size: clamp(1rem, 1.8vw, 1.35rem);
      font-weight: 800;
    }

    .method-options {
      display: inline-flex;
      gap: 8px;
      padding: 5px;
      border: 2px solid #c9cfdd;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.62);
    }

    .method-options button {
      min-width: 92px;
      border: 0;
      border-radius: 6px;
      padding: 9px 12px;
      color: #343944;
      background: transparent;
      font: 800 1rem Arial, Helvetica, sans-serif;
      cursor: pointer;
    }

    .method-options button[aria-pressed="true"] {
      color: #fff;
      background: var(--purple);
    }

    .slider-title {
      color: #3f424b;
      font-size: clamp(1.08rem, 2vw, 1.55rem);
      font-weight: 800;
      white-space: nowrap;
    }

    .slider-value {
      grid-column: 2;
      justify-self: start;
      color: var(--pink);
      font-size: clamp(1rem, 1.8vw, 1.42rem);
      font-weight: 800;
      line-height: 1;
      min-width: 2.2ch;
      text-align: center;
      transform: translateX(var(--value-offset, 0px));
    }

    input[type="range"] {
      grid-column: 2;
      width: 100%;
      appearance: none;
      height: 10px;
      border-radius: 999px;
      background: var(--track);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 28px;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 3px solid #11131a;
      background: #ef4054;
      box-shadow: 0 0 0 9px rgba(239, 64, 84, 0.28);
    }

    input[type="range"]::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 3px solid #11131a;
      background: #ef4054;
      box-shadow: 0 0 0 9px rgba(239, 64, 84, 0.28);
    }

    .readout {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      gap: 14px;
      align-items: center;
      padding-top: 10px;
      font: 700 clamp(1.14rem, 2.5vw, 1.9rem) Georgia, "Times New Roman", serif;
      text-align: center;
    }

    .true-area {
      color: var(--blue);
    }

    .approx-area {
      color: var(--pink);
    }

    @media (max-width: 880px) {
      .graph-wrap {
        height: 500px;
      }

      .controls {
        grid-template-columns: 1fr;
        padding: 22px;
      }

      .slider-block {
        grid-template-columns: 1fr;
      }

      .slider-value,
      input[type="range"] {
        grid-column: 1;
      }

      .readout {
        grid-template-columns: 1fr;
      }

      label,
      .slider-title {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main>
    <p class="intro">
      Approximate the area under a curve with equal-width rectangles. Increase the number of rectangles
      to see the approximation converge toward the exact area.
    </p>

    <section class="applet" aria-label="Riemann sum area applet">
      <div class="graph-wrap">
        <canvas id="graph" aria-label="Interactive graph showing Riemann sum rectangles"></canvas>
      </div>

      <div class="controls">
        <div class="toggles">
          <label><input id="adjustCurve" type="checkbox">Adjust curve</label>
        </div>

        <div class="slider-block">
          <label><input id="showRectangles" type="checkbox" checked><span class="slider-title">Number of rectangles</span></label>
          <div class="slider-value" id="rectangleValue">5</div>
          <input id="rectangleSlider" type="range" min="1" max="20" step="1" value="5" aria-label="Number of rectangles">
        </div>

        <div class="method-block" aria-label="Rectangle construction method">
          <div class="method-title">Rectangle height</div>
          <div class="method-options">
            <button type="button" data-method="left" aria-pressed="false">Left</button>
            <button type="button" data-method="midpoint" aria-pressed="true">Midpoint</button>
            <button type="button" data-method="right" aria-pressed="false">Right</button>
          </div>
        </div>

        <div class="readout">
          <div class="true-area" id="trueArea">Area of the region: 0.00</div>
          <div class="approx-area" id="approxArea">Approximate area: 0.00</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("graph");
    const ctx = canvas.getContext("2d");
    const adjustCurve = document.getElementById("adjustCurve");
    const showRectangles = document.getElementById("showRectangles");
    const rectangleSlider = document.getElementById("rectangleSlider");
    const rectangleValue = document.getElementById("rectangleValue");
    const methodButtons = [...document.querySelectorAll("[data-method]")];
    const trueArea = document.getElementById("trueArea");
    const approxArea = document.getElementById("approxArea");

    const xMin = -0.5;
    const xMax = 5.5;
    const yMin = -0.25;
    const yMax = 2.45;
    const interval = { a: 0, b: 5 };
    const hitRadius = 34;
    let dragIndex = -1;
    let rectangleMethod = "midpoint";

    const points = [
      { x: -0.5, y: 1.95, locked: true },
      { x: 0.00, y: 1.70 },
      { x: 1.05, y: 1.02 },
      { x: 1.80, y: 0.95 },
      { x: 2.75, y: 1.35 },
      { x: 3.55, y: 1.50 },
      { x: 4.40, y: 1.02 },
      { x: 5.20, y: 0.32 },
      { x: 5.50, y: 0.42, locked: true },
    ];

    function clamp(value, lo, hi) {
      return Math.max(lo, Math.min(hi, value));
    }

    function fmt(value) {
      const rounded = Math.round(value * 100) / 100;
      return Object.is(rounded, -0) ? "0.00" : rounded.toFixed(2);
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const scale = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.max(1, Math.round(rect.width * scale));
      canvas.height = Math.max(1, Math.round(rect.height * scale));
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      draw();
    }

    function plotRect() {
      const w = canvas.getBoundingClientRect().width;
      const h = canvas.getBoundingClientRect().height;
      return {
        left: 96,
        right: w - 48,
        top: 28,
        bottom: h - 58,
        width: w - 144,
        height: h - 86,
      };
    }

    function sx(x) {
      const r = plotRect();
      return r.left + (x - xMin) / (xMax - xMin) * r.width;
    }

    function sy(y) {
      const r = plotRect();
      return r.bottom - (y - yMin) / (yMax - yMin) * r.height;
    }

    function graphPoint(px, py) {
      const r = plotRect();
      return {
        x: clamp(xMin + (px - r.left) / r.width * (xMax - xMin), xMin, xMax),
        y: clamp(yMin + (r.bottom - py) / r.height * (yMax - yMin), yMin, yMax),
      };
    }

    function slopeAt(index) {
      if (index === 0) {
        return (points[1].y - points[0].y) / (points[1].x - points[0].x);
      }
      if (index === points.length - 1) {
        const p = points[index - 1];
        const q = points[index];
        return (q.y - p.y) / (q.x - p.x);
      }
      const p = points[index - 1];
      const q = points[index + 1];
      return (q.y - p.y) / (q.x - p.x);
    }

    function f(x) {
      if (x <= points[0].x) return points[0].y;
      for (let i = 0; i < points.length - 1; i += 1) {
        const p = points[i];
        const q = points[i + 1];
        if (x <= q.x) {
          const t = (x - p.x) / (q.x - p.x);
          const h = q.x - p.x;
          const m0 = slopeAt(i);
          const m1 = slopeAt(i + 1);
          const t2 = t * t;
          const t3 = t2 * t;
          const h00 = 2 * t3 - 3 * t2 + 1;
          const h10 = t3 - 2 * t2 + t;
          const h01 = -2 * t3 + 3 * t2;
          const h11 = t3 - t2;
          return clamp(h00 * p.y + h10 * h * m0 + h01 * q.y + h11 * h * m1, 0.05, yMax);
        }
      }
      return points[points.length - 1].y;
    }

    function integrate() {
      const n = 1400;
      const dx = (interval.b - interval.a) / n;
      let sum = 0;
      for (let i = 0; i < n; i += 1) {
        const x1 = interval.a + i * dx;
        const x2 = x1 + dx;
        sum += (f(x1) + f(x2)) * 0.5 * dx;
      }
      return sum;
    }

    function approximateArea() {
      const count = Number(rectangleSlider.value);
      const dx = (interval.b - interval.a) / count;
      let total = 0;
      for (let i = 0; i < count; i += 1) {
        total += f(sampleXForRectangle(i, dx)) * dx;
      }
      return total;
    }

    function sampleXForRectangle(index, dx) {
      if (rectangleMethod === "left") return interval.a + index * dx;
      if (rectangleMethod === "right") return interval.a + (index + 1) * dx;
      return interval.a + (index + 0.5) * dx;
    }

    function curvePath() {
      const path = new Path2D();
      const steps = 720;
      for (let i = 0; i <= steps; i += 1) {
        const x = xMin + (xMax - xMin) * i / steps;
        const y = f(x);
        if (i === 0) path.moveTo(sx(x), sy(y));
        else path.lineTo(sx(x), sy(y));
      }
      return path;
    }

    function drawAxes() {
      const r = plotRect();
      const zeroY = sy(0);
      const zeroX = sx(0);
      ctx.strokeStyle = "#3a3d44";
      ctx.lineWidth = 2.6;
      ctx.beginPath();
      ctx.moveTo(r.left, zeroY);
      ctx.lineTo(r.right + 18, zeroY);
      ctx.moveTo(zeroX, r.bottom);
      ctx.lineTo(zeroX, r.top - 18);
      ctx.stroke();

      ctx.fillStyle = "#3a3d44";
      ctx.beginPath();
      ctx.moveTo(r.right + 18, zeroY);
      ctx.lineTo(r.right + 2, zeroY - 8);
      ctx.lineTo(r.right + 2, zeroY + 8);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(zeroX, r.top - 18);
      ctx.lineTo(zeroX - 8, r.top + 2);
      ctx.lineTo(zeroX + 8, r.top + 2);
      ctx.closePath();
      ctx.fill();

      ctx.font = "700 22px Georgia, serif";
      ctx.fillText("x", r.right + 22, zeroY - 10);
      ctx.fillText("y", zeroX + 14, r.top + 2);

      ctx.font = "700 15px Arial";
      ctx.fillStyle = "#3a3d44";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      for (let x = 0; x <= 5; x += 1) {
        const px = sx(x);
        ctx.strokeStyle = "#3a3d44";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(px, zeroY - 7);
        ctx.lineTo(px, zeroY + 7);
        ctx.stroke();
        ctx.fillText(String(x), px, zeroY + 12);
      }

      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      for (const y of [1, 2]) {
        const py = sy(y);
        ctx.strokeStyle = "#3a3d44";
        ctx.beginPath();
        ctx.moveTo(zeroX - 7, py);
        ctx.lineTo(zeroX + 7, py);
        ctx.stroke();
        ctx.fillText(String(y), zeroX - 15, py);
      }
      ctx.textAlign = "left";
    }

    function drawRegion() {
      const steps = 620;
      const zeroY = sy(0);
      ctx.beginPath();
      ctx.moveTo(sx(interval.a), zeroY);
      for (let i = 0; i <= steps; i += 1) {
        const x = interval.a + (interval.b - interval.a) * i / steps;
        ctx.lineTo(sx(x), sy(f(x)));
      }
      ctx.lineTo(sx(interval.b), zeroY);
      ctx.closePath();
      ctx.fillStyle = "rgba(36, 74, 154, 0.11)";
      ctx.fill();
    }

    function drawRectangles() {
      if (!showRectangles.checked) return;
      const count = Number(rectangleSlider.value);
      const dx = (interval.b - interval.a) / count;
      ctx.lineWidth = 2.2;
      ctx.strokeStyle = "#c33368";
      ctx.fillStyle = "rgba(195, 51, 104, 0.15)";
      for (let i = 0; i < count; i += 1) {
        const x0 = interval.a + i * dx;
        const sampleX = sampleXForRectangle(i, dx);
        const height = f(sampleX);
        const left = sx(x0);
        const right = sx(x0 + dx);
        const top = sy(height);
        const bottom = sy(0);
        ctx.beginPath();
        ctx.rect(left, top, right - left, bottom - top);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#c33368";
        ctx.beginPath();
        ctx.arc(sx(sampleX), top, 3.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(195, 51, 104, 0.15)";
      }
    }

    function drawCurve() {
      ctx.strokeStyle = "#244a9a";
      ctx.lineWidth = 4;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.stroke(curvePath());
    }

    function drawControls() {
      if (!adjustCurve.checked) return;
      for (let i = 1; i < points.length - 1; i += 1) {
        const p = points[i];
        ctx.fillStyle = "rgba(239, 64, 84, 0.22)";
        ctx.beginPath();
        ctx.arc(sx(p.x), sy(p.y), 24, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#ef4054";
        ctx.strokeStyle = "#181b22";
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        ctx.arc(sx(p.x), sy(p.y), 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
    }

    function draw() {
      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
      drawAxes();
      drawRegion();
      drawRectangles();
      drawCurve();
      drawControls();
      updateReadout();
    }

    function updateReadout() {
      const trueValue = integrate();
      const approxValue = approximateArea();
      trueArea.textContent = `Area of the region: ${fmt(trueValue)}`;
      approxArea.textContent = `Approximate area: ${fmt(approxValue)}`;
      rectangleValue.textContent = rectangleSlider.value;
      const min = Number(rectangleSlider.min);
      const max = Number(rectangleSlider.max);
      const value = Number(rectangleSlider.value);
      const ratio = (value - min) / (max - min);
      rectangleValue.style.setProperty("--value-offset", `${ratio * 100}%`);
    }

    function pointer(event) {
      const rect = canvas.getBoundingClientRect();
      return { x: event.clientX - rect.left, y: event.clientY - rect.top };
    }

    function nearestPoint(p) {
      let best = null;
      for (let i = 1; i < points.length - 1; i += 1) {
        const px = sx(points[i].x);
        const py = sy(points[i].y);
        const distance = Math.hypot(p.x - px, p.y - py);
        if (distance <= hitRadius && (!best || distance < best.distance)) {
          best = { index: i, distance };
        }
      }
      return best;
    }

    canvas.addEventListener("pointerdown", event => {
      if (!adjustCurve.checked) return;
      const hit = nearestPoint(pointer(event));
      dragIndex = hit ? hit.index : -1;
      if (dragIndex !== -1) canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener("pointermove", event => {
      if (dragIndex === -1) return;
      const p = pointer(event);
      const graph = graphPoint(p.x, p.y);
      points[dragIndex].y = clamp(graph.y, 0.12, 2.25);
      draw();
    });

    function endDrag(event) {
      dragIndex = -1;
      if (canvas.hasPointerCapture(event.pointerId)) {
        canvas.releasePointerCapture(event.pointerId);
      }
    }

    canvas.addEventListener("pointerup", endDrag);
    canvas.addEventListener("pointercancel", endDrag);
    adjustCurve.addEventListener("change", draw);
    showRectangles.addEventListener("change", draw);
    rectangleSlider.addEventListener("input", draw);
    for (const button of methodButtons) {
      button.addEventListener("click", () => {
        rectangleMethod = button.dataset.method;
        for (const option of methodButtons) {
          option.setAttribute("aria-pressed", String(option === button));
        }
        draw();
      });
    }
    window.addEventListener("resize", resize);
    resize();
  </script>
</body>
</html>
